# Keep the SHA-pinned GitHub Actions in .github/workflows/ current. The workflow pins each action to a
# full commit SHA (supply-chain hardening against a hijacked mutable tag); without a bot those pins go
# stale and miss the actions' own security/bug fixes. Dependabot opens PRs that bump the SHA (and the
# trailing "# vX.Y.Z" comment) as new releases land — restoring "stay current" without giving up pinning.
#
# VERSION UPDATES — github-actions ONLY, deliberately. The maven and npm dependencies are HARD-pinned to
# versions that MUST match the Confluence 10.2.13 platform (jackson 2.21.4, commons-compress 1.28.0) or the
# likec4 toolchain (likec4 1.58.0 across @likec4/*, and the lodash-es override) — an automatic bump there
# would break the build or silently drift off the platform BOM, so those bumps are made deliberately by a
# human, not a bot (see CLAUDE.md "Critical gotchas"). The mock-gitlab base image is digest-pinned and
# refreshed by hand when Node is bumped (see docker/mock-gitlab/Dockerfile).
#
# SECURITY UPDATES fire repo-wide regardless of the version-update scope above. The npm entry below exists
# ONLY to shape them: `open-pull-requests-limit: 0` keeps routine npm version bumps OFF (preserving the
# human-managed policy), while the `ignore` pins Dependabot — including its security PRs — to the
# Node-20-compatible vite 6.x line instead of jumping to a new major. vite 7+ require Node >=20.19, which
# fights the Confluence-10 Node-20 platform pin; this is exactly what security PR #5 did (proposing vite
# 5 -> 8, which broke `npm run typecheck`). NB a version RANGE is used, not `update-types`: update-types
# only affects VERSION updates, whereas security PRs honour a `versions` ignore. A vite advisory will still
# get a PR — just constrained to 6.x. Raise/remove the threshold when vite 7+ is adopted deliberately (with
# the live e2e gate).
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly

  - package-ecosystem: npm
    directory: /src/main/frontend
    schedule:
      interval: weekly
    open-pull-requests-limit: 0   # security-guard entry only — NO routine npm version-update PRs (see above)
    ignore:
      - dependency-name: "vite"
        versions: [">= 7.0.0"]     # keep to the Node-20-compatible vite 6.x line; bump when vite 7+ is adopted
